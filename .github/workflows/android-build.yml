name: Build Android APK

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Setup Node.js Environment
      uses: actions/setup-node@v4
      with:
        node-size: 20
        node-version: 'lts/*'

    - name: Install Mobile Build Dependencies
      run: |
        npm install @capacitor/core @capacitor/cli
        npm install

    - name: Handle Capacitor Platform Configuration
      run: |
        if [ -d "android" ]; then
          echo "✅ Android folder already present. Skipping initialization initialization and syncing assets..."
          npx cap sync android
        else
          echo "Creating native layout directories..."
          npx cap add android
        fi

    - name: Setup Java Development Kit JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Compile and Build APK via Gradle Wrapper
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Upload Compiled APK to GitHub Panel
      uses: actions/upload-artifact@v4
      with:
        name: app-release-debug.apk
        path: android/app/build/outputs/apk/debug/app-debug.apk
