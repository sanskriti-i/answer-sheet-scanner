name: Build Android APK

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Setup Node.js Environment
      uses: actions/setup-node@v4
      with:
        node-version: 'lts/*'

    - name: Install Mobile Build Dependencies
      run: |
        npm install @capacitor/core @capacitor/cli --legacy-peer-deps
        npm install --legacy-peer-deps
        mkdir -p www
        echo '<!DOCTYPE html><html><head><title>App</title></head><body><h1>Loading App Engine...</h1></body></html>' > www/index.html

    - name: Reconstruct Stable Android Native Wrapper Workspace
      run: |
        # 1. Back up your native configurations (like AndroidManifest) temporarily
        mkdir -p /tmp/custom_src
        if [ -d "android/app/src/main" ]; then
          cp -r android/app/src/main/* /tmp/custom_src/
        fi
        
        # 2. Clear old template directory layout
        rm -rf android
        
        # 3. 🟢 DIRECTLY WRITE CLEAN CONFIGURATION DATA INTO A JSON FILE
        cat << 'EOF' > capacitor.config.json
        {
          "appId": "com.sanskriti.aiscanner",
          "appName": "AI Scanner",
          "webDir": "www",
          "server": {
            "url": "https://sanskriti006-answer-sheet-scanner.hf.space",
            "cleartext": true
          }
        }
        EOF
        
        # 4. Generate a fresh native structure using our explicit JSON layout rules
        npx cap add android
        
        # 5. Re-inject your custom native configurations (Manifest permissions)
        if [ -d "/tmp/custom_src" ] && [ "$(ls -A /tmp/custom_src)" ]; then
          cp -r /tmp/custom_src/* android/app/src/main/
        fi
        
        # 6. Finalize assets sync verification
        npx cap sync android

    - name: Setup Java Development Kit JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Compile and Build APK via Gradle Wrapper
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Upload Compiled APK to GitHub Panel
      uses: actions/upload-artifact@v4
      with:
        name: app-release-debug.apk
        path: android/app/build/outputs/apk/debug/app-debug.apk
