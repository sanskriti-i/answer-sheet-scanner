name: Build Android APK

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Setup Node.js Environment
      uses: actions/setup-node@v4
      with:
        node-version: 'lts/*'

    - name: Install Mobile Build Dependencies
      run: |
        npm install @capacitor/core @capacitor/cli --legacy-peer-deps
        npm install --legacy-peer-deps
        mkdir -p www
        echo '<!DOCTYPE html><html><head><title>App</title></head><body><h1>Loading App Engine...</h1></body></html>' > www/index.html

    - name: Reconstruct Stable Android Native Wrapper Workspace
      run: |
        # 1. Clear old configuration cache layouts completely
        rm -rf android
        
        # 2. Create configuration file pointing to your live space
        cat << 'EOF' > capacitor.config.json
        {
          "appId": "com.sanskriti.aiscanner",
          "appName": "answer sheet scanner",
          "webDir": "www",
          "server": {
            "url": "https://sanskriti006-answer-sheet-scanner.hf.space",
            "cleartext": true
          }
        }
        EOF
        
        # 3. Generate a brand new platform workspace
        npx cap add android

        # 4. 🟢 CRASH FIX: Grant Intent Queries permission so app can safely talk to Chrome/System Browser
        sed -i '/<\/manifest>/i \    <queries>\n        <intent>\n            <action android:name="android.intent.action.VIEW" \/>\n            <category android:name="android.intent.category.BROWSABLE" \/>\n            <data android:scheme="https" \/>\n        <\/intent>\n    <\/queries>' android/app/src/main/AndroidManifest.xml

        # 5. FORCE ANDROID HARD-CODED NAME TO "answer sheet scanner"
        sed -i 's/<string name="app_name">.*<\/string>/<string name="app_name">answer sheet scanner<\/string>/g' android/app/src/main/res/values/strings.xml
        
        # 6. CONFIGURE MOBILE WEBVIEW TO FORCE EXCEL DOWNLOADS VIA NATIVE INTENT
        cat << 'EOF' > android/app/src/main/java/com/sanskriti/aiscanner/MainActivity.java
        package com.sanskriti.aiscanner;

        import android.content.Intent;
        import android.net.Uri;
        import android.os.Bundle;
        import android.webkit.DownloadListener;
        import com.getcapacitor.BridgeActivity;

        public class MainActivity extends BridgeActivity {
            @Override
            public void onCreate(Bundle savedInstanceState) {
                super.onCreate(savedInstanceState);
                
                this.getBridge().getWebView().setDownloadListener(new DownloadListener() {
                    @Override
                    public void onDownloadStart(String url, String userAgent, String contentDisposition, String mimetype, long contentLength) {
                        try {
                            Intent i = new Intent(Intent.ACTION_VIEW, Uri.parse(url));
                            i.addFlags(Intent.FLAG_ACTIVITY_NEW_TASK);
                            startActivity(i);
                        } catch (Exception e) {
                            e.printStackTrace();
                        }
                    }
                });
            }
        }
        EOF

        # 7. Finalize sync
        npx cap sync android

    - name: Setup Java Development Kit JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Compile and Build APK via Gradle Wrapper
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Upload Compiled APK to GitHub Panel
      uses: actions/upload-artifact@v4
      with:
        name: app-release-debug.apk
        path: android/app/build/outputs/apk/debug/app-debug.apk
