name: Build Android APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Setup Node.js Environment
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Setup Java Environment
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Install Wrapper Tools
      run: |
        npm install --legacy-peer-deps

    - name: Dynamically Create Web Assets Directory
      run: |
        mkdir -p www
        echo "" > www/index.html

    - name: Create Capacitor Config Manual
      run: |
        echo '{
          "appId": "com.sanskriti.aiscanner",
          "appName": "Answer Sheet Scanner",
          "webDir": "www",
          "server": {
            "url": "https://sanskriti006-answer-sheet-scanner.hf.space",
            "cleartext": true
          }
        }' > capacitor.config.json

    - name: Create Android Native Directory
      run: |
        npx cap add android

    - name: Inject Android Download, Storage & Session Awake Permissions
      run: |
        # Inject download engine features, storage permissions, and wake locks straight into the Android Manifest file
        SED_TARGET="android/app/src/main/AndroidManifest.xml"
        sed -i '/<\/manifest>/i \    <uses-permission android:name="android.permission.INTERNET" />' $SED_TARGET
        sed -i '/<\/manifest>/i \    <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" />' $SED_TARGET
        sed -i '/<\/manifest>/i \    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />' $SED_TARGET
        sed -i '/<\/manifest>/i \    <uses-permission android:name="android.permission.WAKE_LOCK" />' $SED_TARGET
        
        # Configure WebView to allow downloads AND inject WindowManager flags to keep screen active continuously
        MA_PATH="android/app/src/main/java/com/sanskriti/aiscanner/MainActivity.java"
        sed -i '/import com.getcapacitor.BridgeActivity;/a import android.webkit.DownloadListener;\nimport android.webkit.URLUtil;\nimport android.net.Uri;\nimport android.content.Intent;\nimport android.os.Environment;\nimport android.app.DownloadManager;\nimport android.widget.Toast;\nimport android.view.WindowManager;' $MA_PATH
        sed -i '/public class MainActivity extends BridgeActivity {/a \    @Override\n    public void onStart() {\n        super.onStart();\n        \n        // Force the window layout manager to keep the mobile processor and backlight active\n        getWindow().addFlags(WindowManager.LayoutParams.FLAG_KEEP_SCREEN_ON);\n        \n        this.bridge.getWebView().setDownloadListener(new DownloadListener() {\n            @Override\n            public void onDownloadStart(String url, String userAgent, String contentDisposition, String mimetype, long contentLength) {\n                DownloadManager.Request request = new DownloadManager.Request(Uri.parse(url));\n                request.setMimeType(mimetype);\n                String fileName = URLUtil.guessFileName(url, contentDisposition, mimetype);\n                request.setDescription("Downloading spreadsheet...");\n                request.setTitle(fileName);\n                request.allowScanningByMediaScanner();\n                request.setNotificationVisibility(DownloadManager.Request.VISIBILITY_VISIBLE_NOTIFY_COMPLETED);\n                request.setDestinationInExternalPublicDir(Environment.DIRECTORY_DOWNLOADS, fileName);\n                DownloadManager dm = (DownloadManager) getSystemService(DOWNLOAD_SERVICE);\n                dm.enqueue(request);\n                Toast.makeText(getApplicationContext(), "Downloading Excel File...", Toast.LENGTH_LONG).show();\n            }\n        });\n    }' $MA_PATH

    - name: Compile and Build APK via Gradle
      run: |
        cd android && ./gradlew assembleDebug

    - name: Upload Compiled APK to GitHub Panel
      uses: actions/upload-artifact@v4
      with:
        name: Android-App-APK
        path: android/app/build/outputs/apk/debug/app-debug.apk
